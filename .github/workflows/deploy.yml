name: Deploy EVCharge Pro

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Inject secrets directly into index.html ─────────────────────────
      # Pure Python — no sed, no heredocs, no quoting issues.
      # Secrets are passed as env vars; Python reads them and does the replacement.
      - name: Inject config into index.html
        env:
          OCM_KEY: ${{ secrets.OCM_API_KEY }}
          FB_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          python3 << 'PYEOF'
          import os, sys

          ocm = os.environ.get('OCM_KEY', '').strip()
          fb  = os.environ.get('FB_CONFIG', '').strip()

          print(f"OCM key length:      {len(ocm)}")
          print(f"Firebase cfg length: {len(fb)}")

          if not ocm:
              print("WARNING: OCM_API_KEY secret is empty or not set")
          if not fb:
              print("WARNING: FIREBASE_CONFIG secret is empty or not set")

          script = f"""<script>
          /* Injected by GitHub Actions deploy — keys never stored in repo */
          (function(){{
            var k="{ocm}";
            var f={fb};
            if(k) localStorage.setItem('ev_ocm_key', k);
            if(f) localStorage.setItem('ev_fb_config', typeof f==='string' ? f : JSON.stringify(f));
            window._configFromDeploy = true;
            console.log('[EVCharge] Keys injected by deploy. OCM key length:', k.length);
          }})();
          </script>"""

          with open('index.html', 'r') as file:
              html = file.read()

          placeholder = '<!-- @@INJECT_CONFIG@@ -->'
          if placeholder not in html:
              print("ERROR: placeholder not found in index.html — cannot inject config")
              sys.exit(1)

          html = html.replace(placeholder, script)

          with open('index.html', 'w') as file:
              file.write(html)

          # Verify the key actually landed in the file
          if ocm and ocm not in html:
              print("ERROR: OCM key not found in output — injection failed")
              sys.exit(1)

          print("Injection successful")
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
