name: Deploy EVCharge Pro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      # ── Generate config.js ─────────────────────────────────────────────
      # Using env vars avoids any heredoc quoting issues entirely.
      # GitHub Actions expands ${{ secrets.* }} into the env block safely,
      # then the shell just reads $OCM_KEY / $FB_CONFIG as normal variables.
      - name: Generate config.js from secrets
        env:
          OCM_KEY: ${{ secrets.OCM_API_KEY }}
          FB_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          printf 'window.EVCHARGE_CONFIG = { ocmKey: "%s", firebase: %s };\n' \
            "$OCM_KEY" "$FB_CONFIG" > config.js
          echo "=== config.js preview (first 60 chars of each value redacted) ==="
          echo "OCM key length: ${#OCM_KEY}"
          echo "Firebase config length: ${#FB_CONFIG}"

      # ── Deploy to gh-pages ─────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          exclude_assets: '.github,*.md'
