name: Deploy EVCharge Pro to GitHub Pages

on:
  push:
    branches: [main]          # deploy on every push to main
  workflow_dispatch:           # also allow manual trigger from Actions tab

permissions:
  contents: write              # needed to push to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      # ── Write config.js from GitHub Secrets ──────────────────────────
      # This file is generated fresh on every deploy and never committed
      # to your repo — secrets stay encrypted in GitHub.
      # IMPORTANT: Do NOT quote the heredoc delimiter.
      # 'CONFIGEOF' (quoted) = literal string, secrets won't expand.
      #  CONFIGEOF  (bare)   = GitHub Actions expands ${{ secrets.* }} correctly.
      - name: Generate config.js from secrets
        run: |
          cat > config.js << CONFIGEOF
          window.EVCHARGE_CONFIG = {
            ocmKey: "${{ secrets.OCM_API_KEY }}",
            firebase: ${{ secrets.FIREBASE_CONFIG }}
          };
          CONFIGEOF

      # ── Write CNAME for custom domain (e.g. ev.yourdomain.com) ───────
      # Store your subdomain as a secret called CUSTOM_DOMAIN
      # e.g.  CUSTOM_DOMAIN = ev.yourdomain.com
      # Delete this step if you are not using a custom domain.
      - name: Write CNAME file
        run: |
          if [ -n "${{ secrets.CUSTOM_DOMAIN }}" ]; then
            echo "${{ secrets.CUSTOM_DOMAIN }}" > CNAME
            echo "CNAME set to: ${{ secrets.CUSTOM_DOMAIN }}"
          else
            echo "No CUSTOM_DOMAIN secret set, skipping CNAME"
          fi

      # ── Deploy to gh-pages ────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          exclude_assets: '.github'
